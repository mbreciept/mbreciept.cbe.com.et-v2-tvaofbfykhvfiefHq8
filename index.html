<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receipt Viewer</title>

    <style>
        body {
            margin: 0;
            background: #ffffff; /* Sets the entire web page background to pure white */
            font-family: Arial, sans-serif;
        }
        .container {
            width: 100%;
            max-width: 600px; /* Aligns perfectly with a standard mobile receipt width */
            margin: 0 auto;
            background: #ffffff;
            padding: 0;
        }
        .receipt-img {
            width: 100%;
            height: auto;
            display: block; /* Removes any unwanted bottom spacing gaps */
        }
        .download {
            display: block;
            width: 180px;
            /* 100px top margin perfectly creates the large distance down to the button */
            margin: 100px auto 40px auto; 
            text-align: center;
            background: #7a1b87;
            color: #fff;
            text-decoration: none;
            padding: 12px;
            border-radius: 5px;
            font-weight: bold;
        }
        .download:hover {
            background: #64146f;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="Receipt.png" alt="Customer Receipt" class="receipt-img">

    <a class="download" href="CBE-Receipt-FT26181QK8N6.pdf" download="CBE-Receipt-FT26181QK8N6.pdf">Download</a>
</div>

</body>
</html>
