<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receipt Viewer</title>

    <style>
        body {
            margin: 0;
            background: #ffffff; /* Sets the entire page background to pure white */
            font-family: Arial, sans-serif;
        }
        .container {
            width: 95%;
            max-width: 850px;
            margin: 20px auto;
        }
        iframe {
            width: 100%;
            height: 75vh; 
            border: none; /* Removes any harsh black borders */
            background: #ffffff;
            border-radius: 8px;
            /* Uses a very soft, light shadow to blend perfectly with the white background */
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.05); 
        }
        .download {
            display: block;
            width: 180px;
            /* 60px top margin pushes the button down to match your screenshot spacing */
            margin: 60px auto 30px auto; 
            text-align: center;
            background: #7a1b87;
            color: #fff;
            text-decoration: none;
            padding: 12px;
            border-radius: 5px;
            font-weight: bold;
        }
        .download:hover {
            background: #64146f;
        }
    </style>
</head>
<body>

<div class="container">
    <iframe src="https://docs.google.com/gview?url=https://mbreciept.github.io/mbreciept.cbe.com.et-v2-hfHCxzJu1QG9aA1QnkhP/Receipt.pdf&embedded=true"></iframe>

    <a class="download" href="Receipt.pdf" download="Receipt.pdf">Download PDF</a>
</div>

</body>
</html>
